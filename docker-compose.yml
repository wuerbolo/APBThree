services:
  app:
    build: .
    image: bolo:latest
    container_name: bolo
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m
    environment:
      PORT: 3000
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5173}
      # Postgres (Neon) if set, else JSON files under server/data -- see
      # server/src/persistence/store.js. Leave unset for local testing.
      DATABASE_URL: ${DATABASE_URL:-}
    volumes:
      # Safety net for the JSON fallback (and a local cold-backup even in
      # Postgres mode) -- without this, recreating the container wipes
      # server/data since it's not baked into the image.
      - bolo-data:/app/server/data
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.bolo.rule=Host(`${DOMAIN:-bolo.wuerbo.com}`)
      - traefik.http.routers.bolo.entrypoints=websecure
      - traefik.http.routers.bolo.tls.certresolver=letsencrypt
      - traefik.http.services.bolo.loadbalancer.server.port=3000

networks:
  proxy:
    external: true

volumes:
  bolo-data:
